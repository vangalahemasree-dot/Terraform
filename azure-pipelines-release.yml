trigger: none

pr: none

resources:
  pipelines:
  - pipeline: build
    source: terraform-ci

stages:

- stage: Plan
  displayName: 'Terraform Plan'

  jobs:
  - job: PlanJob
    displayName: 'Generate Terraform Plan'

    pool:
      vmImage: ubuntu-latest

    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: AzureCLI@2
      displayName: 'Terraform Plan'
      inputs:
        azureSubscription: 'devopstest'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          terraform init
          terraform validate
          terraform plan -var-file="dev.cfg"
          
- stage: Apply
  displayName: 'Terraform Apply'
  dependsOn: Plan

  jobs:
  - job: ApplyJob
    displayName: 'Apply Terraform'

    pool:
      vmImage: ubuntu-latest

    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: AzureCLI@2
      displayName: 'Terraform Apply'
      inputs:
        azureSubscription: 'devopstest'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          terraform init
          terraform apply -var-file="dev.cfg" -auto-approve